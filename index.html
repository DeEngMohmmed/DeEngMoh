<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study Flow</title>

<style>
body {
  font-family: "Segoe UI", Arial;
  background: #f6f8fb;
  margin: 0;
  overflow-x: auto;
}

h1 {
  text-align: center;
  padding: 20px;
}

/* layout */
.container {
  display: flex;
  gap: 40px;
  padding: 30px;
  position: relative;
}

/* column */
.column {
  min-width: 220px;
}

.column h3 {
  text-align: center;
  margin-bottom: 15px;
}

/* card */
.card {
  background: white;
  padding: 12px;
  border-radius: 12px;
  margin: 10px 0;
  text-align: center;
  font-size: 13px;
  cursor: pointer;
  position: relative;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
  background: #4f46e5;
  color: white;
}

/* popup */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 300px;
}

.modal-box h2 {
  margin-top: 0;
}

.close {
  margin-top: 10px;
  padding: 8px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>

</head>

<body>

<h1>Civil Engineering Plan</h1>

<div class="container">

  <div class="column">
    <h3>Freshman</h3>
    <div class="card" onclick="openModal('Math 144')">Math 144</div>
    <div class="card" onclick="openModal('Phys 140')">Physics</div>
    <div class="card" onclick="openModal('Chem 140')">Chemistry</div>
     <div class="card" onclick="openModal('Phys Lab ')">Physics</div>
     <div class="card" onclick="openModal('Engr 133 ')">Enger</div>

  </div>

  <div class="column">
    <h3>Sophomore</h3>
    <div class="card" onclick="openModal('Math 244')">Calculus</div>
    <div class="card" onclick="openModal('Statics')">Statics</div>
  </div>

  <div class="column">
    <h3>Junior</h3>
    <div class="card" onclick="openModal('Fluid Mechanics')">Fluid</div>
  </div>

  <div class="column">
    <h3>Senior</h3>
    <div class="card" onclick="openModal('Graduation Project')">Project</div>
  </div>

</div>

<!-- popup -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h2 id="title"></h2>
    <p>ابو داحم</p>
    <button class="close" onclick="closeModal()">إغلاق</button>
  </div>
</div>

<script>
function openModal(name) {
  document.getElementById("title").innerText = name;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
