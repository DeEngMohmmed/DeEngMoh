<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study Plan</title>

<style>
body {
  font-family: Arial;
  background: #f1f5f9;
  text-align: center;
}

.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
}

.column {
  background: #e2e8f0;
  padding: 15px;
  border-radius: 12px;
  width: 180px;
}

.column h2 {
  font-size: 16px;
}

.card {
  background: white;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  background: #c7d2fe;
  transform: scale(1.05);
}
</style>
</head>

<body>

<h1>Civil Engineering Plan</h1>

<div class="container">

  <div class="column">
    <h2>Freshman</h2>
    <div class="card" onclick="show('Math 144')">Math 144</div>
    <div class="card" onclick="show('Phys 140')">Phys 140</div>
  </div>

  <div class="column">
    <h2>Sophomore</h2>
    <div class="card" onclick="show('Math 244')">Math 244</div>
  </div>

</div>

<script>
function show(course) {
  alert("Course: " + course);
}
</script>

</body>
</html>
